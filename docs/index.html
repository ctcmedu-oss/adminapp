<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法師專用查詢後台</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
      body { font-family: 'Arial', sans-serif; padding: 20px; background-color: #ecf0f1; color: #2c3e50; margin: 0;}
      .container { max-width: 900px; margin: 0 auto; padding: 25px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
      h2 { text-align: center; color: #2980b9; border-bottom: 2px solid #3498db; padding-bottom: 10px;}
      
      #auth-section { text-align: center; margin-top: 50px; }
      input[type="password"] { width: 80%; max-width: 300px; padding: 12px; font-size: 16px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; }
      button { background-color: #2980b9; color: white; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 5px; font-weight: bold; }
      button:hover { background-color: #34495e; }

      .controls { display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0; background: #f8f9fa; padding: 15px; border-radius: 8px; align-items: center; justify-content: space-between;}
      .tab-group button { background-color: #bdc3c7; color: #333; padding: 10px 20px; margin-right: 5px;}
      .tab-group button.active { background-color: #e67e22; color: white; }
      select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }

      /* 🔍 新增篩選群組樣式 */
      .filter-group { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }

      /* 🛠️【修改】將按鈕改為高質感的莫蘭迪煙鼠尾草綠 */
      .btn-export { background-color: #79b8c5; color: white; margin-left: 10px; padding: 10px 15px; font-size: 15px; border-radius: 5px; font-weight: bold; border: none; cursor: pointer;}
      .btn-export:hover { background-color: #9fae9b; }

      /* 表格容器：防止撐開畫面 */
      .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; }
      table { width: 100%; border-collapse: collapse; font-size: 15px; }
      th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
      th { background-color: #34495e; color: white; position: sticky; top: 0;}
      tr:nth-child(even) { background-color: #f2f2f2; }
      tr:hover { background-color: #fdf2e9; }
      .rank-1 { color: #f1c40f; font-weight: bold; font-size: 18px; }
      .rank-2 { color: #bdc3c7; font-weight: bold; font-size: 18px; }
      .rank-3 { color: #d35400; font-weight: bold; font-size: 18px; }

      #dashboard-section { display: none; }
      .loading { text-align: center; padding: 40px; color: #7f8c8d; font-size: 18px; font-weight: bold; }
      
      /* 錯題區塊的專屬樣式 */
      .wrong-q-section { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #bdc3c7; }
      
      /* 🛠️【修改】同步調整錯題表格標頭，使其與按鈕的鼠尾草綠完美呼應 */
      .wrong-table th { background-color: #79b8c5; color: white; }
      .wrong-table td { line-height: 1.5; }

      /* 📱【新增】手機版 RWD 響應式調整 */
      @media (max-width: 600px) {
        body { padding: 10px; }
        .container { padding: 15px; }
        
        /* 讓上方控制列在手機版變成上下排列 */
        .controls { flex-direction: column; align-items: stretch; gap: 12px; padding: 12px; }
        
        /* 讓切換檢定按鈕平分寬度 */
        .tab-group { display: flex; width: 100%; }
        .tab-group button { flex: 1; text-align: center; margin-right: 5px; padding: 10px 5px; font-size: 14px; }
        .tab-group button:last-child { margin-right: 0; }
        
        /* 篩選與匯出按鈕在手機版垂直排列 */
        .filter-group { flex-direction: column; align-items: stretch; width: 100%; gap: 8px; }
        .filter-group label { margin-right: 0 !important; font-size: 14px; }
        
        select, .btn-export { width: 100%; margin-left: 0 !important; box-sizing: border-box; }
        
        /* 強制表格在手機版可以水平滾動，文字才不會擠壓變形 */
        table { min-width: 600px; }
      }
    </style>
  </head>
  <body>

    <div id="auth-section" class="container">
      <h2>法師專用查詢後台</h2>
      <p>請輸入查閱密碼以驗證身分</p>
      <input type="password" id="adminPwd" placeholder="請輸入密碼">
      <br>
      <button onclick="checkPwd()">進入系統</button>
      <p id="pwd-msg" style="color:red; margin-top:10px;"></p>
    </div>

    <div id="dashboard-section" class="container">
      <h2>義工刷題狀況總覽</h2>
      
      <div class="controls">
        <div class="tab-group">
          <button id="btn-edit" class="active" onclick="switchSubject('文編')">文編檢定</button>
          <button id="btn-photo" onclick="switchSubject('攝影')">攝影檢定</button>
        </div>
        <!-- 💡 這裡加上了 class="filter-group" 方便手機版 RWD 控制 -->
        <div class="filter-group">
          <label style="font-weight:bold; margin-right:10px;">排序條件：</label>
          <select id="sort-select" onchange="renderTable()">
            <option value="total">🏆 總積分最高排行</option>
          </select>
          <button class="btn-export" onclick="exportWrongStats()">🚨 匯出易錯題</button>
        </div>
      </div>

      <!-- 💡 這裡加上了 class="table-wrapper" 防止寬表格撐破手機網頁 -->
      <div id="table-container" class="table-wrapper">
        <div class="loading">資料同步讀取中，請稍候...</div>
      </div>
      
      <div id="wrong-stats-container" class="wrong-q-section table-wrapper"></div>
    </div>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbzR0nxw4mkxT1JkA4w2nQBsRJ0qIVISkz_pu7_hws0ULiksWvyiB_ivIls2dIRQmQm5/exec"; 

      const ADMIN_PASSWORD = "888"; 
      let allData = {};
      let currentSubject = '文編';

      window.onload = function() {
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
          showDashboard();
        }
      };

      async function callApi(action, data = {}) {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: action, ...data })
          });
          const result = await response.json();
          if (result.status === 'success') return result.data;
          else throw new Error(result.message);
        } catch (error) {
          console.error("API 錯誤:", error);
          throw error;
        }
      }

      function checkPwd() {
        if(document.getElementById('adminPwd').value === ADMIN_PASSWORD) {
          sessionStorage.setItem('isLoggedIn', 'true'); 
          showDashboard();
        } else {
          document.getElementById('pwd-msg').innerText = "密碼錯誤，請重新輸入";
        }
      }

      function showDashboard() {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('dashboard-section').style.display = 'block';
        loadData(); 
      }

      async function loadData() {
        try {
          const data = await callApi('getAdminDashboardData');
          allData = data;
          updateWeekDropdown();
          renderTable();
        } catch(e) {
          document.getElementById('table-container').innerHTML = "<div class='loading' style='color:#e74c3c;'>資料讀取失敗，請檢查網路連線或重新整理。</div>";
        }
      }

      function switchSubject(subject) {
        currentSubject = subject;
        document.getElementById('btn-edit').className = (subject === '文編') ? 'active' : '';
        document.getElementById('btn-photo').className = (subject === '攝影') ? 'active' : '';
        updateWeekDropdown();
        renderTable();
      }

      function updateWeekDropdown() {
        let select = document.getElementById('sort-select');
        select.innerHTML = '<option value="total">🏆 總積分最高排行</option>';
        
        if(!allData[currentSubject] || !allData[currentSubject].users) return;
        
        let availableWeeks = new Set();
        allData[currentSubject].users.forEach(user => {
           Object.keys(user.weeks).forEach(w => availableWeeks.add(parseInt(w)));
        });

        let sortedWeeks = Array.from(availableWeeks).sort((a,b) => b - a);
        sortedWeeks.forEach(w => {
           select.innerHTML += `<option value="${w}">📅 第 ${w} 週積分排行</option>`;
        });
      }

      function renderTable() {
        let container = document.getElementById('table-container');
        let wrongContainer = document.getElementById('wrong-stats-container');
        let sortMode = document.getElementById('sort-select').value;
        let list = allData[currentSubject] ? [...allData[currentSubject].users] : [];

        if(list.length === 0) {
          container.innerHTML = "<div class='loading'>目前名單中尚無任何具備此權限的義工。</div>";
          wrongContainer.innerHTML = "";
          return;
        }

        if (sortMode === 'total') {
          list.sort((a, b) => b.totalScore - a.totalScore);
        } else {
          let targetWeek = sortMode;
          list.sort((a, b) => {
            let scoreA = a.weeks[targetWeek] ? a.weeks[targetWeek].score : 0;
            let scoreB = b.weeks[targetWeek] ? b.weeks[targetWeek].score : 0;
            return scoreB - scoreA;
          });
        }

        let html = "<table>";
        if(sortMode === 'total') {
          html += "<tr><th>排名</th><th>姓名</th><th>法名</th><th>義工編號</th><th>📝 刷題總次數</th><th>🏆 累積總積分</th></tr>";
        } else {
          html += `<tr><th>排名</th><th>姓名</th><th>法名</th><th>義工編號</th><th>🎯 第 ${sortMode} 週積分</th><th>該週最高次數</th><th>累積總積分</th></tr>`;
        }

        list.forEach((user, index) => {
          let rank = index + 1;
          let rankIcon = rank;
          if(rank === 1) rankIcon = "<span class='rank-1'>🥇 1</span>";
          if(rank === 2) rankIcon = "<span class='rank-2'>🥈 2</span>";
          if(rank === 3) rankIcon = "<span class='rank-3'>🥉 3</span>";

          let dName = user.dharmaName ? user.dharmaName : "-"; 

          if(sortMode === 'total') {
            let scoreColor = user.totalScore > 0 ? "#e67e22" : "#95a5a6";
            let totalRounds = user.totalCount || Object.values(user.weeks).reduce((sum, w) => sum + (w.maxRound || 0), 0);
            let roundsText = totalRounds > 0 ? `${totalRounds} 次` : "-";
            html += `<tr><td>${rankIcon}</td><td>${user.name}</td><td>${dName}</td><td>${user.id}</td><td style='font-weight:bold; color:#34495e;'>${roundsText}</td><td style='color:${scoreColor}; font-weight:bold;'>${user.totalScore} 分</td></tr>`;
          } else {
            let wData = user.weeks[sortMode] || {score: 0, maxRound: 0};
            let roundText = wData.maxRound > 0 ? `${wData.maxRound} 次` : "-";
            let scoreColor = wData.score > 0 ? "#27ae60" : "#95a5a6";
            html += `<tr><td>${rankIcon}</td><td>${user.name}</td><td>${dName}</td><td>${user.id}</td><td style='color:${scoreColor}; font-weight:bold;'>${wData.score} 分</td><td>${roundText}</td><td>${user.totalScore} 分</td></tr>`;
          }
        });
        html += "</table>";
        container.innerHTML = html;

        // --- 處理錯題顯示區塊 ---
        if (sortMode === 'total') {
          wrongContainer.innerHTML = "<div style='text-align:center; padding:20px; color:#7f8c8d; font-size:16px;'>💡 請在上方選單選擇「特定週次」，即可查看該週的錯題統計。</div>";
        } else {
          let stats = allData[currentSubject].wrongStats[sortMode];
          if (!stats || stats.length === 0) {
            wrongContainer.innerHTML = "<h3 style='color:#c0392b; margin-top:20px; margin-bottom:10px;'>📊 第 " + sortMode + " 週 - 錯題統計</h3><p style='text-align:center; color:#27ae60; padding:15px; font-weight:bold; font-size:16px;'>太棒了！本週沒有任何錯題紀錄。</p>";
          } else {
            let wHtml = "<h3 style='color:#4A5568; margin-top:20px; margin-bottom:15px;'>🚨 第 " + sortMode + " 週 - 易錯題排行榜 <span style='font-size:14px; color:#7f8c8d; font-weight:normal;'>(依錯題次數排序)</span></h3>";
            
            wHtml += "<table class='wrong-table'><tr><th style='width:15%;'>題目編號</th><th style='width:70%;'>題目</th><th style='width:15%;'>答錯次數</th></tr>";
            
            stats.forEach(st => {
              let qId = st.qId || "-";
              
              let countNum = parseInt(st.count) || 0;
              let countColor = (countNum >= 5) ? "#e74c3c" : "#2b6cb0";

              wHtml += `<tr><td style='text-align:center; font-weight:bold; color:#7f8c8d;'>${qId}</td><td style='text-align:left; padding-left:15px;'>${st.qText}</td><td style='text-align:center; color:${countColor}; font-weight:bold;'>${st.count} 次</td></tr>`;
            });
            wHtml += "</table>";
            wrongContainer.innerHTML = wHtml;
          }
        }
      }

      // ==============================================================
      // 點擊按鈕匯出多工作表 Excel 核心函式
      // ==============================================================
      function exportWrongStats() {
        if (!allData[currentSubject] || !allData[currentSubject].wrongStats) {
          alert("目前尚未讀取到易錯題資料，請稍候再試。");
          return;
        }

        const wrongStats = allData[currentSubject].wrongStats;
        const wb = XLSX.utils.book_new(); 
        let hasData = false;

        const weeks = Object.keys(wrongStats).sort((a, b) => parseInt(a) - parseInt(b));

        weeks.forEach(week => {
          const stats = wrongStats[week];
          if (stats && stats.length > 0) {
            hasData = true;

            const sheetData = [["題目編號", "題目", "答錯次數"]];
            
            stats.forEach(item => {
              let qId = item.qId || "-";
              sheetData.push([qId, item.qText, item.count]);
            });

            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            ws['!cols'] = [{ wch: 15 }, { wch: 65 }, { wch: 15 }];
            XLSX.utils.book_append_sheet(wb, ws, `第 ${week} 週`);
          }
        });

        if (!hasData) {
          alert(`目前【${currentSubject}】底下所有週次都沒有錯題紀錄，無須匯出。`);
          return;
        }

        const fileName = `${currentSubject}_易錯題統計.xlsx`;
        XLSX.writeFile(wb, fileName);
      }
    </script>
  </body>
</html>
